# Use this in britekit analyze command (--config yaml/infer-offsets-0.5.yaml).
audio:
  spec_duration: 3.0
  spec_height: 192
  spec_width: 384
  min_freq: 200
  max_freq: 13000
  win_length: .058
  sampling_rate: 28000
  use_spec_cache: true
infer:
  min_score: 0
  segment_len: 3.0
  initial_offsets: [0, .5, 1.0, 1.5, 2.0, 2.5]
misc:
  exclude_list: "data/exclude-pr.txt"
