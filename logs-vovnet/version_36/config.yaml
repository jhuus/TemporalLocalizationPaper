# Training parameters in YAML format
model_type: vovnet.5
head_type: temporal_sed
hidden_channels: 384
lse_temp: 0.5
two_way: true
pretrained: false
load_ckpt_path: null
freeze_backbone: false
multi_label: true
deterministic: false
seed: 100
learning_rate: 0.0015
batch_size: 64
shuffle: true
num_epochs: 20
warmup_fraction: 0.0
save_last_n: 6
num_folds: 1
val_portion: 0.0
train_db: data/training.db
train_pickle: data/training-segments.pkl
test_pickle: null
frame_label_pickle: data/training-frames.pkl
num_workers: 3
compile: false
mixed_precision: false
use_class_weights: false
weight_exponent: 0.5
pos_label_smoothing: 0.1
neg_label_smoothing: 0.03
optimizer: radam
opt_weight_decay: null
opt_beta1: null
opt_beta2: null
drop_rate: 0.1
drop_path_rate: null
sed_fps: 4
frame_loss_weight: 1.0
offpeak_weight: 0.0
max_per_recording: 4
val_max_per_recording: null
augment: true
max_augmentations: 1
noise_class_name: Noise
prob_simple_merge: 0.38
prob_mixup: 0.0
prob_cutmix: 0.0
mixup_alpha: 0.4
prob_fade1: 0.5
min_fade1: 0.1
max_fade1: 1.0
augmentations:
- name: add_real_noise
  params:
    max_fade2: 0.8
    min_fade2: 0.1
    prob_fade2: 0.2
  prob: 0.32
- name: shift_horizontal
  params:
    max_shift: 8
  prob: 0.5
- name: blur
  params:
    min_sigma: 0.5
    max_sigma: 1.0
  prob: 0.1
- name: time_mask
  params:
    max_width2: 128
    num_masks2: 1
  prob: 0.1
